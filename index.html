        // TOEFL iBT -> IELTS 환산 (레퍼런스 표 기준)
        function toeflToIelts(s) {
            if (s >= 118) return 9.0;
            if (s >= 115) return 8.5;
            if (s >= 110) return 8.0;
            if (s >= 102) return 7.5;
            if (s >= 94)  return 7.0;
            if (s >= 79)  return 6.5;
            if (s >= 60)  return 6.0;
            if (s >= 46)  return 5.5;
            if (s >= 35)  return 5.0;
            if (s >= 32)  return 4.5;
            return 4.0; // 0~31 => IELTS 4.0 이하
        }

        // PTE Academic(Updated) -> IELTS 환산 (레퍼런스 표 기준)
        function pteToIelts(s) {
            if (s >= 89) return 8.5;
            if (s >= 84) return 8.0;
            if (s >= 76) return 7.5;
            if (s >= 66) return 7.0;
            if (s >= 56) return 6.5;
            if (s >= 46) return 6.0;
            if (s >= 36) return 5.5;
            if (s >= 29) return 5.0;
            if (s >= 23) return 4.5;

                document.getElementById('options-container').innerHTML = '';
                addChatBubble('ai', '보유하신 시험 종류를 선택해주세요. 입력하신 총점을 IELTS 밴드로 환산해 드립니다.');

                return;
            }

            addChatBubble('user', label);
            document.getElementById('options-container').innerHTML = '';

            const currentQ = questions[step];
            currentState[currentQ.key] = value;
            step++;

            setTimeout(askQuestion, 600);

                    c.appendChild(btn);
                });

            const c = document.getElementById('options-container');

            const max = testType === 'TOEFL' ? 120 : 90;

            `;

            inp.addEventListener('keydown', e => { if (e.key === 'Enter') convertEnglish(testType); });

        // 환산 실행 및 다음 질문으로 진행
        function convertEnglish(testType) {
            const inp = document.getElementById('engScoreInput');
            const min = testType === 'TOEFL' ? 0 : 10;
            const max = testType === 'TOEFL' ? 120 : 90;
            const raw = parseFloat(inp.value);

            if (isNaN(raw) || raw < min || raw > max) {
                inp.classList.add('border-red-500');
                inp.focus();
                return;
            }

            const band = testType === 'TOEFL' ? toeflToIelts(raw) : pteToIelts(raw);
            const bandLabel = band >= 4.5 ? ('IELTS ' + band.toFixed(1)) : 'IELTS 4.0 이하';

            document.getElementById('options-container').innerHTML = '';
            addChatBubble('user', `${testType} ${raw}점`);
            addChatBubble('ai',
                `${testType} ${raw}점은 <strong class="text-white">${bandLabel}</strong> 수준으로 환산됩니다.<br>` +
                `<span class="block mt-2 text-[13px] text-gray-400 leading-relaxed">※ 환산 점수는 참고용입니다. 영국 대학은 각 영역별 세부 점수까지 확인하기 때문에, 정확한 지원 가능 여부는 별도 확인이 필요합니다.</span>`);

            currentState.english = `${testType} ${raw} (${bandLabel} 환산)`;
            step++;
            setTimeout(askQuestion, 900);
        }
